<svg width="100%" viewBox="0 0 700 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Portfolio optimizer architecture</title>
<desc>Structural diagram showing the C++ namespace layers from data through to the report generator, with the pybind11 bridge connecting the C++ optimizer interface to the Python Qiskit layer and IBM Quantum hardware.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .label-sm { font-size: 11px; }
    .label-md { font-size: 13px; font-weight: 500; }
    .label-it { font-size: 11px; font-style: italic; fill: #555; }
    .arr { stroke: #888; fill: none; }
    .cpp-box { fill: #EEEDFE; stroke: #7F77DD; stroke-width: 0.5; }
    .py-box  { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
    .bridge  { fill: #FAECE7; stroke: #D85A30; stroke-width: 1; }
    .cpp-txt { fill: #3C3489; }
    .py-txt  { fill: #0F6E56; }
    .bridge-txt { fill: #993C1D; }
    .container-cpp { fill: #EEEDFE; fill-opacity: 0.08; stroke: #7F77DD; stroke-width: 0.5; }
    .container-py  { fill: #E1F5EE; fill-opacity: 0.08; stroke: #1D9E75; stroke-width: 0.5; }
  </style>
</defs>

<!-- C++ container -->
<rect x="20" y="20" width="440" height="440" rx="16" class="container-cpp"/>
<text class="label-it" x="36" y="42">C++17 system</text>

<!-- Python container -->
<rect x="480" y="160" width="200" height="180" rx="16" class="container-py"/>
<text class="label-it" x="496" y="182">Python / Qiskit</text>

<!-- Report generator -->
<rect x="100" y="52" width="260" height="48" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="230" y="72" text-anchor="middle" dominant-baseline="central">Report generator</text>
<text class="label-sm cpp-txt" x="230" y="88" text-anchor="middle" dominant-baseline="central">HTML · JSON · CSV</text>

<!-- Analytics -->
<rect x="100" y="120" width="260" height="48" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="230" y="140" text-anchor="middle" dominant-baseline="central">Analytics</text>
<text class="label-sm cpp-txt" x="230" y="156" text-anchor="middle" dominant-baseline="central">Sharpe · drawdown · attribution</text>

<!-- Backtest engine -->
<rect x="100" y="188" width="260" height="48" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="230" y="208" text-anchor="middle" dominant-baseline="central">Backtest engine</text>
<text class="label-sm cpp-txt" x="230" y="224" text-anchor="middle" dominant-baseline="central">Walk-forward · transaction costs</text>

<!-- OptimizerInterface label -->
<text class="label-sm" x="230" y="252" text-anchor="middle" fill="#555">OptimizerInterface</text>

<!-- MeanVarianceOptimizer -->
<rect x="60" y="256" width="160" height="56" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="140" y="276" text-anchor="middle" dominant-baseline="central">MeanVariance</text>
<text class="label-sm cpp-txt" x="140" y="294" text-anchor="middle" dominant-baseline="central">OSQP solver</text>

<!-- QiskitSolver -->
<rect x="240" y="256" width="160" height="56" rx="8" class="bridge"/>
<text class="label-md bridge-txt" x="320" y="276" text-anchor="middle" dominant-baseline="central">QiskitSolver</text>
<text class="label-sm bridge-txt" x="320" y="294" text-anchor="middle" dominant-baseline="central">pybind11 bridge</text>

<!-- Risk models -->
<rect x="60" y="332" width="160" height="48" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="140" y="352" text-anchor="middle" dominant-baseline="central">Risk models</text>
<text class="label-sm cpp-txt" x="140" y="368" text-anchor="middle" dominant-baseline="central">EWMA · Ledoit-Wolf</text>

<!-- Data layer -->
<rect x="60" y="400" width="360" height="48" rx="8" class="cpp-box"/>
<text class="label-md cpp-txt" x="240" y="420" text-anchor="middle" dominant-baseline="central">Data layer</text>
<text class="label-sm cpp-txt" x="240" y="436" text-anchor="middle" dominant-baseline="central">CSV · JSON · market data</text>

<!-- qiskit_submit.py -->
<rect x="496" y="196" width="168" height="48" rx="8" class="py-box"/>
<text class="label-md py-txt" x="580" y="216" text-anchor="middle" dominant-baseline="central">qiskit_submit.py</text>
<text class="label-sm py-txt" x="580" y="232" text-anchor="middle" dominant-baseline="central">QAOA · QAMO · QAMOO</text>

<!-- IBM Quantum -->
<rect x="496" y="264" width="168" height="56" rx="8" class="py-box"/>
<text class="label-md py-txt" x="580" y="284" text-anchor="middle" dominant-baseline="central">IBM Quantum</text>
<text class="label-sm py-txt" x="580" y="300" text-anchor="middle" dominant-baseline="central">ibm_fez · ibm_kingston</text>
<text class="label-sm py-txt" x="580" y="314" text-anchor="middle" dominant-baseline="central">Aer simulator</text>

<!-- Arrows inside C++ stack -->
<line x1="230" y1="100" x2="230" y2="118" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="230" y1="168" x2="230" y2="186" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<line x1="140" y1="236" x2="140" y2="254" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="320" y1="236" x2="320" y2="254" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Risk feeds backtest (dashed) -->
<path d="M60 356 L30 356 L30 212 L100 212" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow)"/>

<!-- Data feeds risk and backtest (dashed) -->
<line x1="140" y1="400" x2="140" y2="380" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow)"/>


<!-- Bridge arrow: QiskitSolver to Python -->
<line x1="400" y1="280" x2="494" y2="220" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text class="label-sm" x="460" y="244" text-anchor="middle" fill="#D85A30" font-style="italic">pybind11</text>

<!-- Python to IBM -->
<line x1="580" y1="244" x2="580" y2="262" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

</svg>
